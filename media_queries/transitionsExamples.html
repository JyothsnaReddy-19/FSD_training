<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap:20px;
        }

        .box
        {
            margin-top:10px;
            padding:20px;
            width:200px;
            height:100px;
            background-color:blue;

            transition:0.5s ease-in-out;
        }

        .animated-btn
        {        
            margin-top:30px;
            margin-left:30px;
            padding:10px 20px;
            color:black;
            font-size:16px;
        }
 
        .box:hover
        {
            background-color:green;
        }

        .animated-btn:hover
        {
            color:white;
        }


        .card
        {
            margin-top:20px;
            padding:20px;
            width:200px;
            height:200px;
            background-color:rgb(106, 24, 114);
            border: 1px solid black;
             
            transition:all 0.5s;
        }

        .card:hover
        {
            background-color: blueviolet;
            width: 250px;
            height:250px;
            border: 1px solid black;

        }

        .btn
        {

            margin-top:50px;
            margin-left:50px;
            margin-top: 80px;
            padding:10px 20px;
            color:black;
            font-size:16px;

        }

        .btn:hover
        {   
            color:white;

        }

        hr{
            margin-bottom:  10px;
            
        }


        .navigation
        {
            width:100%;
             
        }

        nav
        {
            display: flex;
            justify-content:space-around;
            background-color:black;
            padding: 10px;
            color:white;
         }

        nav a
        {
            color:white;
            text-decoration:none;
            padding:10px;
            font-size:17px;
        }

        nav a:hover
        {
            
            color:rgb(167, 219, 71);
            font-size:25px;
            text-decoration: underline;

        }


        .zoom
        {
            border:1px solid black
            

        }

         .zoom:hover
         {
                transform: scale(1.2);
                
        }

         

    </style>
</head>

<body>
    
    <h1 style="text-align: center; margin-top: 10px;">Animated Button</h1>

    <div class="box"> 
    
        <button class="animated-btn">Hover Me</button>
    
    </div>

    <hr>
    

    <h1 style="text-align:center;color:brown;margin-top: 10px;">Expanding Card</h1>

    <div class="card">    

        <button class="btn">Expand</button>
    </div>



    <h1 style="text-align: center; margin-top: 50px;">Navigation Hover Effect</h1>
    <div class="navigation">

        <nav>
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#services">Services</a>
            <a href="#contact">Contacts</a>
            
        </nav>

    </div>



    <h1 style="text-align: center; margin-top: 50px;">Image Zoom Effect</h1>
    <div class="zoom">

        <img src="https://picsum.photos/200/150?8" alt="Image 1" style="width:300px; height:300px; margin:10px;">

    </div>


     


</body>
</html>
