<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>



    <style>

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap:20px;
        }

        .loader
        {
            width: 150px;
            height:150px;
            border:10px solid  #093C5D;
            border-top:10px dotted #6FD1D7;
            border-radius: 50%;
            animation:spin 1s linear infinite;
        }
        
        @keyframes spin{
            from 
            {
                transform :rotate(0deg);
            }

            to
            {
                transform: rotate(360deg);
            }

        }


        .move
        {
            width: 150px;
            height: 150px;
            background-color: #1E104E;
            border-radius: 50%;
            animation: move 2s infinite alternate;
        }


        @keyframes move{
            from
            {
                transform: translateX(0);
            }

            to
            {
                transform: translateX(800px);
            }

        }

        .bounce h1
        {
            margin-top: 100px;
        }

        h1 span{
            display:inline-block;
            animation: bouncee 0.8s infinite alternate;
            color: rgb(2, 95, 64);
        }


        h1 span:nth-child(1){ animation-delay:0s; }
        h1  span:nth-child(2){ animation-delay:0.1s; }
        h1 span:nth-child(3){ animation-delay:0.2s; }
        h1 span:nth-child(4){ animation-delay:0.3s; }
        h1 span:nth-child(5){ animation-delay:0.4s; }
        h1 span:nth-child(6){ animation-delay:0.5s; }
        h1 span:nth-child(7){ animation-delay:0.6s; }


        @keyframes bouncee
        {
            from 
            {
                transform: translateY(0);
            }

            to
            {
                transform: translateY(-100px);
            }
        }

    </style>
</head>
<body>
    <h1 style="text-align: center; margin-top: 50px;">Loading Spinner</h1>

    <div class="loader">
    </div>


    <h1 style="text-align: center; margin-top: 50px;">Moving Ball</h1>

    <div class="move"></div>



    <div class="bounce">
    <h1 style="text-align: center; margin-top: 50px;background-color: bisque;">Bouncing Text</h1>
    <h1>
        <span>W</span>
        <span>E</span>
        <span>L</span>
        <span>C</span>
        <span>O</span>
        <span>M</span>
        <span>E</span>
    </h1>
    </div>
    

</body>
</html>
