<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .gallery
        {
            display:grid;
            grid-template-columns: repeat(4,1fr);
            gap:15px;
            padding:20px;
             
             
        }

        .gallery img
        {
            width:100%;
            object-fit:cover;
            height:200px;
            border-radius:7px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        @media (max-width: 768px) {
            .gallery
            {
                grid-template-columns: repeat(2,1fr);
            }
        }

        @media (max-width: 480px) {
            .gallery
            {
                grid-template-columns: 1fr;
            }
        }

        

        
    </style>
</head>




<body>
    <h1 style="text-align:center; color:chocolate">Responsive Gallery</h1>

    <div class="gallery"> 

    <img src="https://picsum.photos/200/150?4" alt="Image 1" style="width:200px; height:150px; margin:10px;">

    <img src="https://picsum.photos/200/150?5" alt="Image 2" style="width:200px; height:150px; margin:10px;">

    <img src="https://picsum.photos/200/150?6" alt="Image 3" style="width:200px; height:150px; margin:10px;">

    <img src="https://picsum.photos/200/150?7" alt="Image 4" style="width:200px; height:150px; margin:10px;">

    <img src="https://picsum.photos/200/150?8" alt="Image 5" style="width:200px; height:150px; margin:10px;">

    <img src="https://picsum.photos/200/150?9" alt="Image 6" style="width:200px; height:150px; margin:10px;">

    <img src="https://picsum.photos/200/150?10" alt="Image 7" style="width:200px; height:150px; margin:10px;">

    <img src="https://picsum.photos/200/150?11" alt="Image 8" style="width:200px; height:150px; margin:10px;">


    </div>

</body> 
</body>
</html>
