<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        
        nav
        {
            display: flex;
            justify-content:space-around;
            background-color:black;
            padding: 10px;
            color:white;
            

        }

        nav a
        {
            color:white;
            text-decoration:none;
            padding:10px;
            font-size:17px;
        }

        nav a:hover
        {
            
            color:rgb(167, 219, 71);
        }

        

        @media (max-width:768px)
        {
            nav
            {
                 
                flex-direction:column;
                align-items:center;
                background-color:rgb(167, 219, 71);
                 
            }

            nav a
            {
                border:1px solid black;
                width:90%;
                margin:5px 0;
                background-color:rgb(216, 174, 255);
                 color:rgb(182, 29, 29);
                 border-radius:5px;

            }
        }
 

    </style>
</head>
<body>
    <h1 style="text-align: center; color:blue; margin-top: 20px;">Responsive Navigation Bar</h1>
    <nav>
         <a href="#home">Home</a>
         <a href="#about">About</a>
         <a href="#services">Services</a>
         <a href="#contact">Contacts</a>
    </nav>
</body>
</html>
