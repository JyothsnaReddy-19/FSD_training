        }

        .student-profile
        {
            display:flex;
            flex-direction:row;
            margin-top:30px;
            border:1px solid black;
            padding:20px;
            border-radius:10px;

             border-radius:10px;
           
        }

        .student-details
        {
             margin-top:20px;
        }

         
        .student-details h3
        {
            margin-top:20px;
            text-align:left;
               
        }
         
        img
        {
            margin-top:20px;
            border-radius:50%;
            border: 1px solid black;
        }

         


        @media (max-width:768px)

                padding:10px;

            }
