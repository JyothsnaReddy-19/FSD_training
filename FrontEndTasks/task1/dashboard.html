<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container mt-5">

<h2 class="text-center mb-4">
Student Dashboard
</h2>

<div class="row g-4">

<div class="col-md-3">
<div class="card bg-primary text-white stats-card">
<div class="card-body">
<h5>Total Students</h5>
<h2>1200</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-success text-white stats-card">
<div class="card-body">
<h5>Present Students</h5>
<h2>1100</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-danger text-white stats-card">
<div class="card-body">
<h5>Absent Students</h5>
<h2>100</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card bg-warning text-dark stats-card">
<div class="card-body">
<h5>Placements</h5>
<h2>350</h2>
</div>
</div>
</div>

</div>

<div class="mt-5">

<input type="text"
class="form-control mb-3"
placeholder="Search Student">

<div class="table-responsive">

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>Roll No</th>
<th>Name</th>
<th>Branch</th>
<th>Attendance</th>
</tr>

</thead>

<tbody>

<tr>
<td>101</td>
<td>Rahul</td>
<td>CSE</td>
<td><span class="badge bg-success">90%</span></td>
</tr>

<tr>
<td>102</td>
<td>Anjali</td>
<td>ECE</td>
<td><span class="badge bg-warning">75%</span></td>
</tr>

<tr>
<td>103</td>
<td>Kiran</td>
<td>EEE</td>
<td><span class="badge bg-danger">60%</span></td>
</tr>

</tbody>

</table>

</div>

</div>

</div>
 

<div class="text-center mt-4 mb-5">

    <a href="index.html"
       class="btn btn-custom btn-lg">

        Home

    </a>

</div>

</body>
</html>
