
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            Student Registration Form
        </h2>

        <form action="dashboard.html">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text"
                        class="form-control"
                        required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Roll Number</label>
                    <input type="text"
                        class="form-control"
                        required>
                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Email</label>
                    <input type="email"
                        class="form-control"
                        required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Mobile Number</label>
                    <input type="tel"
                        maxlength="10"
                        class="form-control"
                        required>
                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label>Gender</label>

                    <select class="form-select">

                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Branch</label>

                    <select class="form-select">

                        <option>CSE</option>
                        <option>ECE</option>
                        <option>EEE</option>

                    </select>

                </div>

            </div>

            <div class="mb-3">

                <label>Date of Birth</label>

                <input type="date"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label>Address</label>

                <textarea class="form-control"
                    rows="3"></textarea>

            </div>

            <div class="mb-3">

                <label>Upload Photo</label>

                <input type="file"
                    class="form-control">

            </div>

            <div class="form-check mb-3">

                <input type="checkbox"
                    class="form-check-input">

                <label class="form-check-label">
                    Accept Terms and Conditions
                </label>

            </div>

            <button class="btn btn-primary w-100">
                Register
            </button>

        </form>

    </div>

</div>

</body>
</html>
