<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Contact Us</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-center mb-4">
Contact Us
</h2>

<div class="alert alert-info">
We will respond within 24 hours.
</div>

<form>

<div class="mb-3">

<label>Name</label>

<input type="text"
class="form-control">

</div>

<div class="mb-3">

<label>Email</label>

<input type="email"
class="form-control">

</div>

<div class="mb-3">

<label>Subject</label>

<input type="text"
class="form-control">

</div>

<div class="mb-3">

<label>Message</label>

<textarea class="form-control"
rows="5"></textarea>

</div>

<button class="btn btn-success w-100">
Send Message
</button>

</form>

</div>

</div>

</body>
</html>
