 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Gallery</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f5f5f5;
        }

        .gallery-card{
            border:none;
            border-radius:15px;
            overflow:hidden;
            transition:0.3s;
        }

        .gallery-card:hover{
            transform:scale(1.03);
        }

        .gallery-card img{
            height:250px;
            object-fit:cover;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <h1 class="text-center fw-bold mb-5">
        Event Gallery
    </h1>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow gallery-card">
                <img src="https://images.unsplash.com/photo-1511578314322-379afb476865"
                     class="img-fluid">
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow gallery-card">
                <img src="img.png"
                     class="img-fluid">
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow gallery-card">
                <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30"
                     class="img-fluid">
            </div>
        </div>

    </div>

</div>

<nav aria-label="Page navigation">

    <ul class="pagination justify-content-center pb-4">

        <li class="page-item">
            <a class="page-link"
               href="schedule.html">
                Previous
            </a>
        </li>

         

    </ul>

</nav>

</body>
</html>
