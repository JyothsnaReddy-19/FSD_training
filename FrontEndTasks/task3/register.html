 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Event Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <style>

        body{
            background:linear-gradient(to right,#141e30,#243b55);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial,sans-serif;
        }

        .register-box{
            width:100%;
            max-width:700px;
            background:white;
            padding:40px;
            border-radius:20px;
        }

        .register-title{
            color:#243b55;
            font-weight:bold;
        }

        .form-control,
        .form-select{
            border-radius:12px;
            padding:12px;
        }

        .form-control:focus,
        .form-select:focus{
            box-shadow:none;
            border-color:#ffc107;
        }

        .btn-register{
            background:#ffc107;
            border:none;
            padding:12px 40px;
            font-size:18px;
            border-radius:30px;
            transition:0.3s;
        }

        .btn-register:hover{
            background:#e0a800;
            transform:scale(1.05);
        }

    </style>

</head>

<body>

<div class="register-box shadow-lg">

    <h1 class="text-center mb-4 register-title">
        Event Registration
    </h1>

    <form>

        <div class="mb-3">

            <label class="form-label fw-bold">
                Student Name
            </label>

            <input type="text"
                   class="form-control"
                   placeholder="Enter your name"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label fw-bold">
                Roll Number
            </label>

            <input type="text"
                   class="form-control"
                   placeholder="Enter roll number"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label fw-bold">
                Branch
            </label>

            <input type="text"
                   class="form-control"
                   placeholder="Enter branch"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label fw-bold">
                Email
            </label>

            <input type="email"
                   class="form-control"
                   placeholder="Enter email"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label fw-bold">
                Mobile Number
            </label>

            <input type="tel"
                   class="form-control"
                   placeholder="Enter mobile number"
                   required>

        </div>

        <div class="mb-4">

            <label class="form-label fw-bold">
                Event Selection
            </label>

            <select class="form-select"
                    required>

                <option value="">
                    Choose Event
                </option>

                <option>
                    Technical Quiz
                </option>

                <option>
                    Hackathon
                </option>

                <option>
                    Poster Presentation
                </option>

                <option>
                    Coding Contest
                </option>

                <option>
                    Project Expo
                </option>

                <option>
                    Cultural Fest
                </option>

            </select>

        </div>

        <div class="text-center">

            <button type="button"
                    class="btn btn-register"
                    data-bs-toggle="modal"
                    data-bs-target="#successModal">

                Register Now

            </button>

        </div>

    </form>

</div>

<div class="modal fade"
     id="successModal">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Success
                </h5>

                <button class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body text-center">

                <h4 class="text-success">
                    🎉 Registration Successful!
                </h4>

                <p>
                    Your event registration has been submitted.
                </p>

            </div>

            <div class="modal-footer">

                <a href="index.html"
                   class="btn btn-dark w-100">

                    Go To Home

                </a>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
